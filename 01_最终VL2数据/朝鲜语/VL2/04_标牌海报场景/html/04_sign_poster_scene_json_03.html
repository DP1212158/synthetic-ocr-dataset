<body><main class="page sign-page" data-template-id="sign_poster_scene_v03"><section class="wall-board"><section class="wall-note"><div class="section-title" data-block-id="04_sign_poster_scene_json_03_b0001" data-label="section_title" >소중한 용기와 귀한 시간에</div><div class="small" data-block-id="04_sign_poster_scene_json_03_b0002" data-label="paragraph" >있는 단어를 빠르고 정확하게 소리 내어 읽었고 한눈에 잘 식별하였다. 학생 는</div></section><section class="wall-note"><div class="section-title" data-block-id="04_sign_poster_scene_json_03_b0003" data-label="section_title" >이연이 꽃다발을 내밀자</div><div class="small" data-block-id="04_sign_poster_scene_json_03_b0004" data-label="paragraph" >※ 1~3 다음을 듣고 가장 알맞은 그림 또는 그래프를 고르십시오. 각 2점</div></section><section class="wall-note"><div class="section-title" data-block-id="04_sign_poster_scene_json_03_b0005" data-label="section_title" >의미를 이해하기까지 독자의</div><div class="small" data-block-id="04_sign_poster_scene_json_03_b0006" data-label="paragraph" >처음 그의〈상록수〉를 들었던 38년 전으로 되돌아갔다. 그리고 상상 속에서만</div></section><section class="wall-note"><div class="section-title" data-block-id="04_sign_poster_scene_json_03_b0007" data-label="section_title" >것도 없다.진리의 깨달음</div><div class="small" data-block-id="04_sign_poster_scene_json_03_b0008" data-label="paragraph" >‘뭐야, 아저씨잖아?&#x27; 그때 내가 했던 말은 뭐 대강 이랬다. ‘아저씨면 어때,</div></section><section class="wall-note"><div class="section-title" data-block-id="04_sign_poster_scene_json_03_b0009" data-label="section_title" >기억나지 않는다. 확실히</div><div class="small" data-block-id="04_sign_poster_scene_json_03_b0010" data-label="paragraph" >아니다. 올레길의 상징인 화살표와 리본은 방향을 알려 주는 지침일 뿐 길 자체는</div></section><aside><div class="image-box" data-block-id="04_sign_poster_scene_json_03_b0011" data-label="image"  data-is-text="false" data-asset-id="COCO_val2014_000000057550" data-asset-source="random120-coco2014" data-asset-crop="object-fit-cover"><img src="../../assets/random120-coco2014/COCO_val2014_000000057550.jpg" style="width:100%;height:100%;object-fit:cover;display:block;" alt="" data-asset-img="true" /></div><div class="meta" data-block-id="04_sign_poster_scene_json_03_b0012" data-label="metadata" >2026</div></aside></section></main></body>
